<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Cameras - YOLO AI Server</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/style.css">
<link rel="stylesheet" href="/static/cameras/cameras.css">
</head>
<body>

<div class="app-layout">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="brand">
      <span>YOLO</span> AI Server
    </div>
    <nav class="nav-links">
      <a href="/ui/cameras" class="nav-item active">
        <span class="nav-icon">CA</span> <span class="nav-text">Cameras</span>
      </a>
      <a href="/ui/models" class="nav-item">
        <span class="nav-icon">MO</span> <span class="nav-text">Models</span>
      </a>
      <a href="/ui/jobs" class="nav-item">
        <span class="nav-icon">JB</span> <span class="nav-text">Jobs</span>
      </a>
      <a href="/ui/trackers" class="nav-item">
        <span class="nav-icon">TK</span> <span class="nav-text">Trackers</span>
      </a>
      <a href="/ui/training" class="nav-item">
        <span class="nav-icon">TR</span> <span class="nav-text">Training</span>
      </a>
    </nav>
  </aside>

  <!-- Main Content -->
  <main class="main-content">
    <header>
      <div class="page-title">
        <h1>Camera Management</h1>
        <p>Configure RTSP streams and view live feeds</p>
      </div>
     
    </header>

    <div class="content-grid">
      <div class="card list-card">
        <h3>Registered Cameras</h3>
        <div id="cameras-list" class="cameras-list">
          <!-- Cameras will be populated here -->
        </div>
      </div>

      <div class="card add-camera-card" id="add-camera-form">
        <h3>Add New Camera</h3>
        <div class="form-group">
          <label for="cam-name">Camera Name</label>
          <input id="cam-name" placeholder="e.g. Front Door" />
        </div>
        <div class="form-group">
          <label for="cam-rtsp">RTSP URL</label>
          <input id="cam-rtsp" placeholder="rtsp://username:password@192.168.1.100:554/stream" />
        </div>
        <button onclick="addCamera()" class="btn btn-primary" style="width: 100%; margin-top: 4px;">Add Camera</button>
      </div>
    </div>

    <div class="live-view-section" id="live-view-section" style="display:none;">
      <h3>Live Preview</h3>
      <div class="viewer-container">
        <img id="stream" src="" alt="Select a camera to view" />
        <button class="close-btn" onclick="closeViewer()">×</button>
      </div>
    </div>
  </main>
</div>

<script src="/static/cameras/cameras.js"></script>
</body>
</html>
