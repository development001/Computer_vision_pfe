<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>YOLO AI Server</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/style.css">

</head>

<body>

<header>
  YOLO AI Server Dashboard
  <span class="small-text">Detection & Stream Control Panel</span>
</header>

<div class="container">

  <div class="sidebar">

    <div class="card">
      <h3>Add Camera</h3>
      <label>Name</label>
      <input id="cam-name" placeholder="Camera name"/>

      <label>RTSP URL</label>
      <input id="cam-rtsp" placeholder="rtsp://..."/>

      <button onclick="addCamera()">Add Camera</button>
    </div>

    <div class="card">
      <h3>Model Settings</h3>

      <label>Available Models</label>
      <select id="models"></select>

      <label>Image Size</label>
      <select id="imgsz">
        <option value="320">320</option>
        <option value="480">480</option>
        <option value="640" selected>640</option>
        <option value="736">736</option>
        <option value="1280">1280</option>
      </select>
    </div>

    <div class="card">
      <h3>RTSP Configuration</h3>

      <label>Width</label>
      <input type="number" id="rtsp_width" value="640">

      <label>Height</label>
      <input type="number" id="rtsp_height" value="640">

      <label>FPS</label>
      <input type="number" id="rtsp_fps" value="15">

      <label>Reconnect Delay (s)</label>
      <input type="number" id="rtsp_reconnect_delay" value="3.0" step="0.1">

      <label>Buffer Size</label>
      <input type="number" id="rtsp_buffer_size" value="1">

      <label>Read Timeout (s)</label>
      <input type="number" id="rtsp_read_timeout" value="5.0" step="0.1">

      <label>OpenCV Backend</label>
      <select id="rtsp_cv2_backend">
        <option value="">Default</option>
        <option value="FFMPEG">FFMPEG</option>
        <option value="GSTREAMER">GStreamer</option>
        <option value="DSHOW">DirectShow</option>
        <option value="MSMF">Media Foundation</option>
      </select>
    </div>

    <div class="card">
      <h3>Upload Model</h3>
      <input type="file" id="model-file" accept=".pt,.onnx"/>
      <button onclick="uploadModel()">Upload Model</button>
      <div id="upload-status" class="small-text"></div>
    </div>

  </div>

  <div class="main">

    <div class="card">
      <h3>Cameras</h3>
      <div id="cameras"></div>
    </div>

    <div class="card">
      <h3>Active Jobs</h3>
      <div id="jobs"></div>
    </div>

    <div class="card">
      <h3>Live Stream</h3>
      <div class="viewer">
        <img id="stream" src="" alt="stream"/>
      </div>
    </div>

  </div>

</div>

<script src="/static/script.js"></script>

</body>
</html>
