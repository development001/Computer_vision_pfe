<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Cameras - YOLO AI Server</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/style.css">
<link rel="stylesheet" href="/static/cameras.css">
</head>
<body>

<header>
  <div class="header-content">
    <a href="/" class="logo">YOLO AI Server</a>
    <nav>
      <a href="/ui/cameras" class="active">Cameras</a>
      <a href="/ui/models">Models</a>
      <a href="/ui/trackers">Trackers</a>
      <a href="/ui/jobs">Jobs</a>
    </nav>
  </div>
</header>

<div class="container">
  <div class="page-header">
    <h1>Camera Management</h1>
    <p>Configure RTSP streams and view live feeds.</p>
  </div>

  <div class="content-grid">
    <div class="card add-camera-card">
      <h3>Add New Camera</h3>
      <div class="form-group">
        <label for="cam-name">Camera Name</label>
        <input id="cam-name" placeholder="e.g. Front Door" />
      </div>
      <div class="form-group">
        <label for="cam-ip">IP Address</label>
        <input id="cam-ip" placeholder="192.168.1.100" />
      </div>
      <div class="form-group">
        <label for="cam-user">Username</label>
        <input id="cam-user" placeholder="admin" />
      </div>
      <div class="form-group">
        <label for="cam-pass">Password</label>
        <input id="cam-pass" type="password" placeholder="password" />
      </div>
      <div class="form-group">
        <label for="cam-channel">Channel</label>
        <input id="cam-channel" placeholder="1" />
      </div>
      <button onclick="addCamera()" class="primary-btn">Add Camera</button>
    </div>

    <div class="card list-card">
      <h3>Registered Cameras</h3>
      <div id="cameras-list" class="cameras-list">
        <!-- Cameras will be populated here -->
      </div>
    </div>
  </div>

  <div class="live-view-section" id="live-view-section" style="display:none;">
    <h3>Live Preview</h3>
    <div class="viewer-container">
      <img id="stream" src="" alt="Select a camera to view" />
      <button class="close-btn" onclick="closeViewer()">×</button>
    </div>
  </div>

</div>

<script src="/static/cameras.js"></script>
</body>
</html>
