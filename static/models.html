<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Models - YOLO AI Server</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/style.css">
<link rel="stylesheet" href="/static/models.css">
</head>
<body>

<header>
  <div class="header-content">
    <a href="/" class="logo">YOLO AI Server</a>
    <nav>
      <a href="/ui/cameras">Cameras</a>
      <a href="/ui/models" class="active">Models</a>
      <a href="/ui/trackers">Trackers</a>
      <a href="/ui/jobs">Jobs</a>
    </nav>
  </div>
</header>

<div class="container">
  <div class="page-header">
    <h1>Model Management</h1>
    <p>Upload and manage YOLO models for detection.</p>
  </div>

  <div class="content-grid">
    <div class="card upload-card">
      <h3>Upload New Model</h3>
      <div class="upload-area">
        <input type="file" id="model-file" accept=".pt,.onnx" hidden/>
        <label for="model-file" class="upload-label">
          <span class="icon">📁</span>
          <span>Click to select .pt or .onnx file</span>
        </label>
        <div id="file-name" class="file-name"></div>
        <button onclick="uploadModel()" class="primary-btn">Upload Model</button>
        <div id="upload-status" class="status-text"></div>
      </div>
    </div>

    <div class="card list-card">
      <h3>Available Models</h3>
      <ul id="models-list" class="models-list">
        <!-- Models will be populated here -->
      </ul>
    </div>
  </div>
</div>

<script src="/static/models.js"></script>
</body>
</html>
